<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nested Rotating Rings Clock</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="left-overlay">
        <div class="designer-text">
            <h1 class="gradient-text name-gradient">Designed by</h1>
            <span class="gradient-text name-gradient">Dishank Girase</span>
        </div>
    </div>

    <div class="vertical-line"></div>
    <div class="right-side">
        <div id="clock-container">
            <div id="outer-wrapper" class="ring-wrapper" style="width: 600px; height: 600px">
                <div id="outer-ring" class="ring"></div>
            </div>
            <div id="middle-wrapper" class="ring-wrapper" style="width: 480px; height: 480px">
                <div id="middle-ring" class="ring"></div>
            </div>
            <div id="inner-wrapper" class="ring-wrapper" style="width: 380px; height: 380px">
                <div id="inner-ring" class="ring"></div>
            </div>
        </div>
        <div id="mobile-name">
            <h1>Designed by</h1>
            <span>Dishank Girase</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
